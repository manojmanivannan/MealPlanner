services:
  # --- LOCAL DEVELOPMENT PROFILE ---
  # ---------------------------------

  # Front end service for local development
  nginx-local:
    profiles:
      - local
    # image: nginx:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
      # - ./html:/usr/share/nginx/html
    depends_on:
      backend:
        condition: service_healthy
    
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./frontend/html
          target: /usr/share/nginx/html

  # ------ PRODUCTION PROFILE -------
  # ---------------------------------

  # Tailscale service to provide secure access to nginx-prod
  tailscale-nginx:

    profiles:
      - prod
    image: tailscale/tailscale:latest
    pull_policy: always
    hostname: meal_planner
    environment:
      - TS_AUTHKEY=$TS_AUTHKEY
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/meal.json
      - TS_USERSPACE=false
    volumes:
      - ${PWD}/tailscale-nginx/state:/var/lib/tailscale
      - ${PWD}/config:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    restart: unless-stopped

  # Front end service behind Tailscale
  nginx-prod:
    profiles:
      - prod
    # image: nginx:latest
    build:
      context: .
      dockerfile: frontend/Dockerfile
    # - ./frontend/html:/usr/share/nginx/html
    depends_on:
      backend:
        condition: service_healthy
      tailscale-nginx:
        condition: service_started
    network_mode: service:tailscale-nginx
    restart: unless-stopped

  # --- COMMON SERVICES (Always run) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - POSTGRES_USER=$POSTGRES_USER
      - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
      - POSTGRES_DB=$POSTGRES_DB
      - LOG_LEVEL=debug
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose -O /dev/null --tries=1 http://localhost:5000/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    develop:
      watch:
        - action: sync
          path: ./backend/
          target: /app
  db:
    image: postgres:17.9
    environment:
      - POSTGRES_USER=$POSTGRES_USER
      - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
      - POSTGRES_DB=$POSTGRES_DB
      - PGUSER=postgres
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "recipes", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

