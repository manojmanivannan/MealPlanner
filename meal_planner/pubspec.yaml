name: meal_planner
description: Offline MealPlanner app (Android 10+) using Flutter, Riverpod, and Drift.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  drift: ^2.19.0
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.24
  path: ^1.9.0
  path_provider: ^2.1.4
  file_selector: ^1.0.3
  csv: ^5.0.2
  uuid: ^4.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/ingredients.csv
    - assets/data/recipes.csv
    - assets/data/weekly_plan.csv
    - assets/meal_logo.ico

dev_dependencies:
  build_runner: ^2.4.12
  drift_dev: ^2.19.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/meal_logo.ico"
